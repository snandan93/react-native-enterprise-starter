name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Yarn 4
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn test --runInBand
